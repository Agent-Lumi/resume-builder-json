<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Builder JSON - Create Professional Resumes</title>
    <link rel="manifest" href="manifest.json">
    <script>if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js")</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Light theme (default) */
            --bg-primary: #11998e;
            --bg-secondary: #38ef7d;
            --bg-gradient: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            --panel-bg: white;
            --panel-text: #1f2937;
            --panel-border: #e5e7eb;
            --input-bg: white;
            --input-text: #1f2937;
            --input-border: #e5e7eb;
            --input-focus: #11998e;
            --resume-preview-bg: #fafafa;
            --header-text: white;
            --resume-header-border: #11998e;
            --resume-section-title: #11998e;
            --resume-text: #4b5563;
            --json-bg: #1f2937;
            --json-text: #10b981;
            --shadow: rgba(0,0,0,0.2);
            --btn-secondary-bg: #f3f4f6;
            --btn-secondary-text: #4b5563;
        }
        
        [data-theme="dark"] {
            --bg-primary: #0f766e;
            --bg-secondary: #059669;
            --bg-gradient: linear-gradient(135deg, #0f766e 0%, #059669 100%);
            --panel-bg: #1f2937;
            --panel-text: #f9fafb;
            --panel-border: #374151;
            --input-bg: #111827;
            --input-text: #f9fafb;
            --input-border: #374151;
            --input-focus: #10b981;
            --resume-preview-bg: #111827;
            --header-text: #f9fafb;
            --resume-header-border: #10b981;
            --resume-section-title: #34d399;
            --resume-text: #d1d5db;
            --json-bg: #0f172a;
            --json-text: #34d399;
            --shadow: rgba(0,0,0,0.5);
            --btn-secondary-bg: #374151;
            --btn-secondary-text: #d1d5db;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s ease;
        }
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.5em;
            transition: all 0.3s ease;
            border: 2px solid rgba(255,255,255,0.3);
            z-index: 1000;
        }
        .theme-toggle:hover {
            transform: scale(1.1);
            background: rgba(255,255,255,0.3);
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            color: var(--header-text);
            padding: 40px 0;
        }
        header h1 { font-size: 2.5em; margin-bottom: 10px; }
        header p { opacity: 0.9; }
        .builder {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .editor-panel {
            background: var(--panel-bg);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 20px 40px var(--shadow);
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }
        .editor-panel h2 {
            margin-bottom: 20px;
            color: var(--panel-text);
            font-size: 1.3em;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--panel-text);
            font-weight: 500;
            font-size: 0.9em;
            opacity: 0.9;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            background: var(--input-bg);
            color: var(--input-text);
            border: 2px solid var(--input-border);
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.95em;
            transition: all 0.2s;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--input-focus);
        }
        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin-top: 10px;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }
        .btn-primary {
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            color: white;
        }
        .btn-secondary {
            background: var(--btn-secondary-bg);
            color: var(--btn-secondary-text);
        }
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        .preview-panel {
            background: var(--panel-bg);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 20px 40px var(--shadow);
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }
        .preview-panel h2 {
            margin-bottom: 20px;
            color: var(--panel-text);
            font-size: 1.3em;
        }
        .resume-preview {
            background: var(--resume-preview-bg);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 30px;
            min-height: 500px;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }
        .resume-header {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--resume-header-border);
            margin-bottom: 20px;
        }
        .resume-header h1 {
            font-size: 1.8em;
            color: var(--panel-text);
            margin-bottom: 5px;
        }
        .resume-header p {
            color: var(--resume-text);
        }
        .resume-section {
            margin-bottom: 20px;
        }
        .resume-section h3 {
            color: var(--resume-section-title);
            font-size: 1.1em;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .resume-section p {
            color: var(--resume-text);
            line-height: 1.6;
            margin-bottom: 8px;
        }
        .json-output {
            background: var(--json-bg);
            color: var(--json-text);
            padding: 20px;
            border-radius: 8px;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 0.85em;
            overflow-x: auto;
            margin-top: 20px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        footer {
            text-align: center;
            color: var(--header-text);
            padding: 30px;
            opacity: 0.8;
        }
        footer a { color: var(--header-text); }
        
        /* Action buttons container */
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }
        .action-buttons .btn {
            margin-top: 0;
        }
        .action-buttons .btn-full {
            grid-column: 1 / -1;
        }
        
        /* Print styles */
        @media print {
            body { background: white !important; padding: 0; }
            .theme-toggle, .editor-panel, footer, .action-buttons, .json-output, h3 { display: none !important; }
            .preview-panel { box-shadow: none; }
            .resume-preview { border: none; }
        }
        
        @media (max-width: 768px) {
            .builder { grid-template-columns: 1fr; }
            .theme-toggle { top: 10px; right: 10px; width: 40px; height: 40px; font-size: 1.2em; }
            header h1 { font-size: 1.8em; }
            header { padding: 30px 0; }
        }
        
        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1f2937;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 500;
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s ease;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        .toast.success { background: #10b981; }
        .toast.error { background: #ef4444; }
        
        /* Keyboard shortcuts hint */
        .shortcuts-hint {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.75em;
            opacity: 0;
            transition: opacity 0.3s;
            cursor: pointer;
        }
        .shortcuts-hint:hover { opacity: 1; }
        .shortcuts-hint.visible { opacity: 0.7; }
        
        /* Loading spinner for PDF */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="theme-toggle" id="themeToggle" title="Toggle theme (T)">
        <span id="themeIcon">🌙</span>
    </div>
    
    <div class="container">
        <header>
            <h1>📄 Resume Builder JSON</h1>
            <p>Create professional resumes from JSON data</p>
        </header>
        
        <div class="builder">
            <div class="editor-panel">
                <h2>✏️ Edit Information</h2>
                
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="fullName" placeholder="John Doe">
                </div>
                
                <div class="form-group">
                    <label>Job Title</label>
                    <input type="text" id="jobTitle" placeholder="Software Engineer">
                </div>
                
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="john@example.com">
                </div>
                
                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" id="phone" placeholder="+1 234 567 890">
                </div>
                
                <div class="form-group">
                    <label>Summary</label>
                    <textarea id="summary" placeholder="Brief professional summary..."></textarea>
                </div>
                
                <div class="form-group">
                    <label>Experience</label>
                    <textarea id="experience" placeholder="Job Title - Company (Year)
Description..."></textarea>
                </div>
                
                <div class="form-group">
                    <label>Education</label>
                    <textarea id="education" placeholder="Degree - University (Year)"></textarea>
                </div>
                
                <div class="form-group">
                    <label>Skills (comma separated)</label>
                    <input type="text" id="skills" placeholder="JavaScript, Python, React, Node.js">
                </div>
                
                <div class="action-buttons">
                    <button class="btn btn-primary" onclick="downloadJSON()" title="Ctrl+S">
                        💾 Save JSON
                    </button>
                    <button class="btn btn-secondary" onclick="loadExample()">
                        📋 Load Example
                    </button>
                    <button class="btn btn-secondary" onclick="importJSON()">
                        📁 Import JSON
                    </button>
                    <button class="btn btn-secondary" onclick="printResume()" title="Ctrl+P">
                        🖨️ Print/PDF
                    </button>
                    <button class="btn btn-danger" onclick="clearAll()">
                        🗑️ Clear All
                    </button>
                </div>
            </div>
            
            <div class="preview-panel">
                <h2>👁️ Live Preview</h2>
                
                <div class="resume-preview" id="resumePreview">
                    <div style="text-align: center; color: var(--resume-text); padding: 50px 0;">
                        Fill in the form to see your resume preview
                    </div>
                </div>
                
                <h3 style="margin-top: 20px; color: var(--panel-text);">JSON Output:</h3>
                <div class="json-output" id="jsonOutput">{
  "message": "Fill in the form to generate JSON"
}</div>
            </div>
        </div>
        
        <footer>
            <p>Made with 💡 by <a href="https://github.com/Agent-Lumi">Lumi</a> for @shalkith</p>
        </footer>
    </div>
    
    <div class="shortcuts-hint" id="shortcutsHint" title="Click to see all shortcuts">
        ⌨️ Ctrl+S Save · Ctrl+P Print · T Theme
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script>
        // Theme management
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        
        // Load saved theme or use system preference
        const savedTheme = localStorage.getItem('resume-builder-theme');
        const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            themeIcon.textContent = theme === 'dark' ? '☀️' : '🌙';
            themeToggle.title = theme === 'dark' ? 'Switch to light theme (T)' : 'Switch to dark theme (T)';
            localStorage.setItem('resume-builder-theme', theme);
        }
        
        if (savedTheme) {
            setTheme(savedTheme);
        } else if (systemDark) {
            setTheme('dark');
        }
        
        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            setTheme(currentTheme === 'dark' ? 'light' : 'dark');
        });
        
        // Data management
        const getFormData = () => ({
            fullName: document.getElementById('fullName').value,
            jobTitle: document.getElementById('jobTitle').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value,
            summary: document.getElementById('summary').value,
            experience: document.getElementById('experience').value,
            education: document.getElementById('education').value,
            skills: document.getElementById('skills').value.split(',').map(s => s.trim()).filter(s => s)
        });
        
        const setFormData = (data) => {
            document.getElementById('fullName').value = data.fullName || '';
            document.getElementById('jobTitle').value = data.jobTitle || '';
            document.getElementById('email').value = data.email || '';
            document.getElementById('phone').value = data.phone || '';
            document.getElementById('summary').value = data.summary || '';
            document.getElementById('experience').value = data.experience || '';
            document.getElementById('education').value = data.education || '';
            document.getElementById('skills').value = Array.isArray(data.skills) ? data.skills.join(', ') : (data.skills || '');
        };
        
        // Update preview
        function updateResume() {
            const data = getFormData();
            
            // Build preview HTML
            let previewHTML = '';
            
            if (data.fullName) {
                previewHTML += `
                    <div class="resume-header">
                        <h1>${escapeHtml(data.fullName)}</h1>
                        ${data.jobTitle ? `<p>${escapeHtml(data.jobTitle)}</p>` : ''}
                        <p style="margin-top: 10px; font-size: 0.9em;">
                            ${data.email ? `📧 ${escapeHtml(data.email)}` : ''}
                            ${data.phone ? (data.email ? ' | ' : '') + `📱 ${escapeHtml(data.phone)}` : ''}
                        </p>
                    </div>
                `;
            }
            
            if (data.summary) {
                previewHTML += `
                    <div class="resume-section">
                        <h3>Summary</h3>
                        <p>${escapeHtml(data.summary)}</p>
                    </div>
                `;
            }
            
            if (data.experience) {
                previewHTML += `
                    <div class="resume-section">
                        <h3>Experience</h3>
                        <p>${escapeHtml(data.experience).replace(/\n/g, '<br>')}</p>
                    </div>
                `;
            }
            
            if (data.education) {
                previewHTML += `
                    <div class="resume-section">
                        <h3>Education</h3>
                        <p>${escapeHtml(data.education).replace(/\n/g, '<br>')}</p>
                    </div>
                `;
            }
            
            if (data.skills.length > 0) {
                previewHTML += `
                    <div class="resume-section">
                        <h3>Skills</h3>
                        <p>${data.skills.map(s => escapeHtml(s)).join(' • ')}</p>
                    </div>
                `;
            }
            
            if (previewHTML) {
                document.getElementById('resumePreview').innerHTML = previewHTML;
            } else {
                document.getElementById('resumePreview').innerHTML = `
                    <div style="text-align: center; color: var(--resume-text); padding: 50px 0;">
                        Fill in the form to see your resume preview
                    </div>
                `;
            }
            
            // Update JSON output
            document.getElementById('jsonOutput').textContent = JSON.stringify(data, null, 2);
            
            // Auto-save to localStorage
            localStorage.setItem('resume-builder-data', JSON.stringify(data));
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Real-time updates
        document.querySelectorAll('input, textarea').forEach(el => {
            el.addEventListener('input', updateResume);
        });
        
        // Download JSON
        function downloadJSON() {
            const data = getFormData();
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `resume-${(data.fullName || 'untitled').toLowerCase().replace(/\s+/g, '-')}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('JSON downloaded successfully! 💾', 'success');
        }
        
        // Import JSON
        function importJSON() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json,application/json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        setFormData(data);
                        updateResume();
                        showToast('Resume imported successfully! 📁', 'success');
                    } catch (err) {
                        showToast('Invalid JSON file! ❌', 'error');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }
        
        // Print/PDF export
        function printResume() {
            const data = getFormData();
            if (!data.fullName) {
                showToast('Please add at least your name first! 📝', 'error');
                return;
            }
            window.print();
        }
        
        // Clear all
        function clearAll() {
            if (confirm('Are you sure you want to clear all data? This cannot be undone.')) {
                document.querySelectorAll('input, textarea').forEach(el => el.value = '');
                updateResume();
                localStorage.removeItem('resume-builder-data');
                showToast('All data cleared! 🗑️', 'success');
            }
        }
        
        // Load example
        function loadExample() {
            setFormData({
                fullName: 'Jane Smith',
                jobTitle: 'Senior Software Engineer',
                email: 'jane.smith@example.com',
                phone: '+1 (555) 123-4567',
                summary: 'Experienced software engineer with 8+ years in full-stack development. Passionate about clean code, scalable architecture, and mentoring junior developers.',
                experience: 'Senior Software Engineer - Tech Corp (2020-Present)\n• Led team of 5 developers in building microservices architecture\n• Reduced application load time by 40% through optimization\n\nSoftware Engineer - Startup Inc (2017-2020)\n• Built RESTful APIs serving 1M+ daily requests\n• Implemented CI/CD pipeline reducing deployment time by 60%',
                education: 'M.S. Computer Science - Stanford University (2017)\nB.S. Computer Science - MIT (2015)',
                skills: ['JavaScript', 'Python', 'React', 'Node.js', 'AWS', 'Docker', 'Kubernetes', 'PostgreSQL']
            });
            updateResume();
            showToast('Example loaded! 📋', 'success');
        }
        
        // Toast notification
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.metaKey) {
                switch(e.key.toLowerCase()) {
                    case 's':
                        e.preventDefault();
                        downloadJSON();
                        break;
                    case 'p':
                        e.preventDefault();
                        printResume();
                        break;
                }
            } else if (e.key.toLowerCase() === 't' && !e.ctrlKey && !e.metaKey && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
                themeToggle.click();
            }
        });
        
        // Show shortcuts hint after a delay
        setTimeout(() => {
            document.getElementById('shortcutsHint').classList.add('visible');
        }, 2000);
        
        // Load saved data on startup
        const savedData = localStorage.getItem('resume-builder-data');
        if (savedData) {
            try {
                const data = JSON.parse(savedData);
                setFormData(data);
                updateResume();
            } catch (e) {
                console.error('Failed to load saved data');
            }
        }
        
        // Initial render
        updateResume();
    </script>
</body>
</html>
