<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Builder JSON - Create Professional Resumes</title>
    <link rel="manifest" href="manifest.json">
    <script>if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js")</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            color: white;
            padding: 40px 0;
        }
        header h1 { font-size: 2.5em; margin-bottom: 10px; }
        header p { opacity: 0.9; }
        .builder {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .editor-panel {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .editor-panel h2 {
            margin-bottom: 20px;
            color: #1f2937;
            font-size: 1.3em;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #4b5563;
            font-weight: 500;
            font-size: 0.9em;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.95em;
            transition: border-color 0.2s;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #11998e;
        }
        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
            margin-top: 10px;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn-primary {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }
        .btn-secondary {
            background: #f3f4f6;
            color: #4b5563;
        }
        .btn-small {
            padding: 8px 16px;
            font-size: 0.85em;
        }
        .preview-panel {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .preview-panel h2 {
            margin-bottom: 20px;
            color: #1f2937;
            font-size: 1.3em;
        }
        .resume-preview {
            background: #fafafa;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 30px;
            min-height: 500px;
            font-size: 0.9em;
        }
        .resume-header {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 2px solid #11998e;
            margin-bottom: 20px;
        }
        .resume-header h1 {
            font-size: 1.8em;
            color: #1f2937;
            margin-bottom: 5px;
        }
        .resume-header p {
            color: #6b7280;
        }
        .resume-section {
            margin-bottom: 20px;
        }
        .resume-section h3 {
            color: #11998e;
            font-size: 1.1em;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .resume-section p {
            color: #4b5563;
            line-height: 1.6;
            margin-bottom: 8px;
        }
        .json-output {
            background: #1f2937;
            color: #10b981;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Monaco', monospace;
            font-size: 0.85em;
            overflow-x: auto;
            margin-top: 20px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        footer {
            text-align: center;
            color: white;
            padding: 30px;
            opacity: 0.8;
        }
        footer a { color: white; }
        @media (max-width: 768px) {
            .builder { grid-template-columns: 1fr; }
        }
        /* Dark theme styles */
        body.dark-theme {
            background: linear-gradient(135deg, #1a202c 0%, #2d3748 100%);
        }
        body.dark-theme .editor-panel,
        body.dark-theme .preview-panel {
            background: #2d3748;
            color: #e2e8f0;
        }
        body.dark-theme .editor-panel h2,
        body.dark-theme .preview-panel h2,
        body.dark-theme .preview-panel h3 {
            color: #e2e8f0;
        }
        body.dark-theme .form-group label {
            color: #a0aec0;
        }
        body.dark-theme .form-group input,
        body.dark-theme .form-group textarea {
            background: #1a202c;
            border-color: #4a5568;
            color: #e2e8f0;
        }
        body.dark-theme .form-group input:focus,
        body.dark-theme .form-group textarea:focus {
            border-color: #38ef7d;
        }
        body.dark-theme .resume-preview {
            background: #1a202c;
            border-color: #4a5568;
        }
        body.dark-theme .json-output {
            background: #1a202c;
            color: #38ef7d;
        }
        body.dark-theme .resume-header h1 { color: #e2e8f0; }
        body.dark-theme .resume-header p { color: #a0aec0; }
        body.dark-theme .resume-section h3 { color: #38ef7d; }
        body.dark-theme .resume-section p { color: #cbd5e0; }
        body.dark-theme .btn-secondary {
            background: #4a5568;
            color: #e2e8f0;
        }
        /* Print styles */
        @media print {
            body { background: white !important; }
            .editor-panel { display: none; }
            .preview-panel { box-shadow: none; }
            .btn { display: none; }
            footer { display: none; }
        }
        /* Toast notification */
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            z-index: 1000;
            animation: slideUp 0.3s ease-out;
        }
        .toast.success { background: #10b981; }
        .toast.error { background: #ef4444; }
        /* NEW: Template selector styles */
        select { width: 100%; padding: 10px 12px; border: 2px solid #e5e7eb; border-radius: 8px; font-family: inherit; font-size: 0.95em; background: white; cursor: pointer; transition: border-color 0.2s; }
        select:focus { outline: none; border-color: #11998e; }
        /* NEW: Color picker styles */
        .color-picker { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .color-btn { width: 32px; height: 32px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: all 0.2s; padding: 0; margin: 0; }
        .color-btn:hover { transform: scale(1.1); }
        .color-btn.active { border-color: #1f2937; box-shadow: 0 0 0 2px white, 0 0 0 4px #1f2937; }
        #customColor { width: 32px; height: 32px; border: none; border-radius: 50%; cursor: pointer; padding: 0; overflow: hidden; }
        /* NEW: Section toggle styles */
        .toggle-sections { display: flex; flex-wrap: wrap; gap: 12px; }
        .toggle-checkbox { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 0.9em; color: #4b5563; }
        .toggle-checkbox input { cursor: pointer; }
        /* Template-specific preview styles */
        .template-modern .resume-header { border-bottom: 3px solid var(--accent-color, #11998e); }
        .template-modern .resume-section h3 { text-transform: none; letter-spacing: normal; border-bottom: 1px solid var(--accent-color, #11998e); padding-bottom: 5px; }
        .template-minimal .resume-header { border-bottom: 1px solid #e5e7eb; }
        .template-minimal .resume-section h3 { color: #1f2937; text-transform: none; letter-spacing: normal; font-weight: 600; }
        .template-creative .resume-header { background: var(--accent-color, #11998e); color: white; padding: 30px; border-radius: 8px; margin-bottom: 20px; }
        .template-creative .resume-header h1 { color: white; }
        .template-creative .resume-header p { color: rgba(255,255,255,0.9); }
        .template-creative .resume-section h3 { color: var(--accent-color, #11998e); background: rgba(17,153,142,0.1); padding: 8px 12px; border-radius: 4px; }
        /* Dark mode for new elements */
        body.dark-theme select { background: #1a202c; border-color: #4a5568; color: #e2e8f0; }
        body.dark-theme .color-btn.active { border-color: #e2e8f0; box-shadow: 0 0 0 2px #1a202c, 0 0 0 4px #e2e8f0; }
        body.dark-theme .toggle-checkbox { color: #a0aec0; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📄 Resume Builder JSON</h1>
            <p>Create professional resumes from JSON data</p>
        </header>
        
        <div class="builder">
            <div class="editor-panel">
                <h2>✏️ Edit Information</h2>
                
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="fullName" placeholder="John Doe" oninput="updateResume()">
                </div>
                
                <div class="form-group">
                    <label>Job Title</label>
                    <input type="text" id="jobTitle" placeholder="Software Engineer" oninput="updateResume()">
                </div>
                
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="john@example.com" oninput="updateResume()">
                </div>
                
                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" id="phone" placeholder="+1 234 567 890" oninput="updateResume()">
                </div>
                
                <div class="form-group">
                    <label>Summary</label>
                    <textarea id="summary" placeholder="Brief professional summary..." oninput="updateResume()"></textarea>
                </div>
                
                <div class="form-group">
                    <label>Experience</label>
                    <textarea id="experience" placeholder="Job Title - Company (Year)&#10;Description..." oninput="updateResume()"></textarea>
                </div>
                
                <div class="form-group">
                    <label>Education</label>
                    <textarea id="education" placeholder="Degree - University (Year)" oninput="updateResume()"></textarea>
                </div>
                
                <div class="form-group">
                    <label>Skills (comma separated)</label>
                    <input type="text" id="skills" placeholder="JavaScript, Python, React, Node.js" oninput="updateResume()">
                </div>
                
                <!-- NEW: Template Selector -->
                <div class="form-group">
                    <label>Resume Template</label>
                    <select id="template" onchange="updateResume()">
                        <option value="professional">👔 Professional (Classic)</option>
                        <option value="modern">✨ Modern (Clean)</option>
                        <option value="minimal">📄 Minimal (Simple)</option>
                        <option value="creative">🎨 Creative (Colorful)</option>
                    </select>
                </div>
                
                <!-- NEW: Custom Accent Color -->
                <div class="form-group">
                    <label>Accent Color</label>
                    <div class="color-picker">
                        <button type="button" class="color-btn active" data-color="#11998e" style="background: #11998e;" onclick="setAccentColor('#11998e')"></button>
                        <button type="button" class="color-btn" data-color="#6366f1" style="background: #6366f1;" onclick="setAccentColor('#6366f1')"></button>
                        <button type="button" class="color-btn" data-color="#ec4899" style="background: #ec4899;" onclick="setAccentColor('#ec4899')"></button>
                        <button type="button" class="color-btn" data-color="#f59e0b" style="background: #f59e0b;" onclick="setAccentColor('#f59e0b')"></button>
                        <button type="button" class="color-btn" data-color="#3b82f6" style="background: #3b82f6;" onclick="setAccentColor('#3b82f6')"></button>
                        <button type="button" class="color-btn" data-color="#10b981" style="background: #10b981;" onclick="setAccentColor('#10b981')"></button>
                        <input type="color" id="customColor" value="#11998e" onchange="setAccentColor(this.value)" title="Custom color">
                    </div>
                </div>
                
                <!-- NEW: Section Toggles -->
                <div class="form-group">
                    <label>Show Sections</label>
                    <div class="toggle-sections">
                        <label class="toggle-checkbox"><input type="checkbox" id="showSummary" checked onchange="updateResume()"> Summary</label>
                        <label class="toggle-checkbox"><input type="checkbox" id="showExperience" checked onchange="updateResume()"> Experience</label>
                        <label class="toggle-checkbox"><input type="checkbox" id="showEducation" checked onchange="updateResume()"> Education</label>
                        <label class="toggle-checkbox"><input type="checkbox" id="showSkills" checked onchange="updateResume()"> Skills</label>
                    </div>
                </div>
                
                <button class="btn btn-primary" onclick="downloadJSON()">💾 Download JSON</button>
                <button class="btn btn-secondary" onclick="loadExample()">📋 Load Example</button>
                <input type="file" id="importFile" accept=".json" style="display: none;" onchange="importJSON(event)">
                <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()">📁 Import JSON</button>
                <button class="btn btn-primary" style="background: linear-gradient(135deg, #e53e3e 0%, #c53030 100%); margin-top: 10px;" onclick="printResume()">🖨️ Print / Save as PDF</button>
            </div>
            
            <div class="preview-panel">
                <h2>👁️ Preview</h2>
                
                <div class="resume-preview" id="resumePreview">
                    <div style="text-align: center; color: #9ca3af; padding: 50px 0;">
                        Fill in the form to see your resume preview
                    </div>
                </div>
                
                <h3 style="margin-top: 20px; color: #1f2937;">JSON Output:</h3>
                <div class="json-output" id="jsonOutput">{
  "message": "Fill in the form to generate JSON"
}</div>
            </div>
        </div>
        
        <footer>
            <p>Made with 💡 by <a href="https://github.com/Agent-Lumi">Lumi</a> for @shalkith</p>
            <p style="margin-top: 10px; font-size: 0.85em; opacity: 0.8;">
                <button class="btn btn-small" onclick="toggleTheme()" id="themeBtn" style="padding: 5px 15px; font-size: 0.85em;">🌙 Toggle Dark Mode</button>
            </p>
        </footer>
    </div>
    
    <script>
        // Global accent color
        let currentAccentColor = localStorage.getItem('accentColor') || '#11998e';

        // Load saved data on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadSavedData();
            loadTemplateSettings();
            if (localStorage.getItem('darkTheme') === 'true') {
                document.body.classList.add('dark-theme');
                document.getElementById('themeBtn').textContent = '☀️ Toggle Light Mode';
            }
            // Apply saved accent color
            setAccentColor(currentAccentColor, false);
        });
        
        function updateResume() {
            const data = {
                fullName: document.getElementById('fullName').value,
                jobTitle: document.getElementById('jobTitle').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                summary: document.getElementById('summary').value,
                experience: document.getElementById('experience').value,
                education: document.getElementById('education').value,
                skills: document.getElementById('skills').value.split(',').map(s => s.trim()).filter(s => s),
                template: document.getElementById('template').value,
                accentColor: currentAccentColor,
                showSummary: document.getElementById('showSummary').checked,
                showExperience: document.getElementById('showExperience').checked,
                showEducation: document.getElementById('showEducation').checked,
                showSkills: document.getElementById('showSkills').checked
            };
            
            const template = data.template || 'professional';
            const previewEl = document.getElementById('resumePreview');
            
            // Update preview
            let previewHTML = '';
            
            if (data.fullName) {
                previewHTML += `
                    <div class="resume-header">
                        <h1>${data.fullName}</h1>
                        ${data.jobTitle ? `<p>${data.jobTitle}</p>` : ''}
                        <p style="margin-top: 10px;">
                            ${data.email ? `📧 ${data.email}` : ''}
                            ${data.phone ? ` | 📱 ${data.phone}` : ''}
                        </p>
                    </div>
                `;
            }
            
            if (data.summary && data.showSummary) {
                previewHTML += `
                    <div class="resume-section">
                        <h3>Summary</h3>
                        <p>${data.summary}</p>
                    </div>
                `;
            }
            
            if (data.experience && data.showExperience) {
                previewHTML += `
                    <div class="resume-section">
                        <h3>Experience</h3>
                        <p>${data.experience.replace(/\n/g, '<br>')}</p>
                    </div>
                `;
            }
            
            if (data.education && data.showEducation) {
                previewHTML += `
                    <div class="resume-section">
                        <h3>Education</h3>
                        <p>${data.education.replace(/\n/g, '<br>')}</p>
                    </div>
                `;
            }
            
            if (data.skills.length > 0 && data.showSkills) {
                previewHTML += `
                    <div class="resume-section">
                        <h3>Skills</h3>
                        <p>${data.skills.join(' • ')}</p>
                    </div>
                `;
            }
            
            if (previewHTML) {
                previewEl.innerHTML = previewHTML;
                previewEl.className = `resume-preview template-${template}`;
                previewEl.style.setProperty('--accent-color', data.accentColor);
            }
            
            // Update JSON output
            document.getElementById('jsonOutput').textContent = JSON.stringify(data, null, 2);
            
            // Auto-save to localStorage
            localStorage.setItem('resume-data', JSON.stringify(data));
        }
        
        function loadSavedData() {
            const saved = localStorage.getItem('resume-data');
            if (saved) {
                const data = JSON.parse(saved);
                document.getElementById('fullName').value = data.fullName || '';
                document.getElementById('jobTitle').value = data.jobTitle || '';
                document.getElementById('email').value = data.email || '';
                document.getElementById('phone').value = data.phone || '';
                document.getElementById('summary').value = data.summary || '';
                document.getElementById('experience').value = data.experience || '';
                document.getElementById('education').value = data.education || '';
                document.getElementById('skills').value = Array.isArray(data.skills) ? data.skills.join(', ') : data.skills || '';
                updateResume();
            }
        }
        
        function loadTemplateSettings() {
            const saved = localStorage.getItem('resume-data');
            if (saved) {
                const data = JSON.parse(saved);
                if (data.template) document.getElementById('template').value = data.template;
                if (data.showSummary !== undefined) document.getElementById('showSummary').checked = data.showSummary;
                if (data.showExperience !== undefined) document.getElementById('showExperience').checked = data.showExperience;
                if (data.showEducation !== undefined) document.getElementById('showEducation').checked = data.showEducation;
                if (data.showSkills !== undefined) document.getElementById('showSkills').checked = data.showSkills;
                if (data.accentColor) currentAccentColor = data.accentColor;
            }
        }
        
        function setAccentColor(color, update = true) {
            currentAccentColor = color;
            localStorage.setItem('accentColor', color);
            document.getElementById('customColor').value = color;
            
            // Update active button
            document.querySelectorAll('.color-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.color === color) btn.classList.add('active');
            });
            
            if (update) updateResume();
        }
        
        function downloadJSON() {
            const data = {
                fullName: document.getElementById('fullName').value,
                jobTitle: document.getElementById('jobTitle').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                summary: document.getElementById('summary').value,
                experience: document.getElementById('experience').value,
                education: document.getElementById('education').value,
                skills: document.getElementById('skills').value.split(',').map(s => s.trim()).filter(s => s),
                template: document.getElementById('template').value,
                accentColor: currentAccentColor,
                showSummary: document.getElementById('showSummary').checked,
                showExperience: document.getElementById('showExperience').checked,
                showEducation: document.getElementById('showEducation').checked,
                showSkills: document.getElementById('showSkills').checked
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'resume.json';
            a.click();
            URL.revokeObjectURL(url);
            showToast('✅ JSON downloaded successfully!', 'success');
        }
        
        function loadExample() {
            document.getElementById('fullName').value = 'Jane Smith';
            document.getElementById('jobTitle').value = 'Senior Software Engineer';
            document.getElementById('email').value = 'jane.smith@example.com';
            document.getElementById('phone').value = '+1 (555) 123-4567';
            document.getElementById('summary').value = 'Experienced software engineer with 8+ years in full-stack development. Passionate about clean code, scalable architecture, and mentoring junior developers.';
            document.getElementById('experience').value = 'Senior Software Engineer - Tech Corp (2020-Present)\n• Led team of 5 developers in building microservices architecture\n• Reduced application load time by 40% through optimization\n\nSoftware Engineer - Startup Inc (2017-2020)\n• Built RESTful APIs serving 1M+ daily requests\n• Implemented CI/CD pipeline reducing deployment time by 60%';
            document.getElementById('education').value = 'M.S. Computer Science - Stanford University (2017)\nB.S. Computer Science - MIT (2015)';
            document.getElementById('skills').value = 'JavaScript, Python, React, Node.js, AWS, Docker, Kubernetes, PostgreSQL';
            
            updateResume();
            showToast('✅ Example loaded!', 'success');
        }
        
        // Import JSON functionality
        function importJSON(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    document.getElementById('fullName').value = data.fullName || '';
                    document.getElementById('jobTitle').value = data.jobTitle || '';
                    document.getElementById('email').value = data.email || '';
                    document.getElementById('phone').value = data.phone || '';
                    document.getElementById('summary').value = data.summary || '';
                    document.getElementById('experience').value = data.experience || '';
                    document.getElementById('education').value = data.education || '';
                    document.getElementById('skills').value = Array.isArray(data.skills) ? data.skills.join(', ') : data.skills || '';
                    if (data.template) document.getElementById('template').value = data.template;
                    if (data.accentColor) setAccentColor(data.accentColor, false);
                    if (data.showSummary !== undefined) document.getElementById('showSummary').checked = data.showSummary;
                    if (data.showExperience !== undefined) document.getElementById('showExperience').checked = data.showExperience;
                    if (data.showEducation !== undefined) document.getElementById('showEducation').checked = data.showEducation;
                    if (data.showSkills !== undefined) document.getElementById('showSkills').checked = data.showSkills;
                    updateResume();
                    showToast('✅ Resume imported successfully!', 'success');
                } catch (err) {
                    showToast('❌ Error importing file. Please check the JSON format.', 'error');
                }
            };
            reader.readAsText(file);
        }
        
        // Toast notification
        function showToast(message, type = '') {
            const toast = document.createElement('div');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // Print resume
        function printResume() {
            const template = document.getElementById('template').value;
            const accentColor = currentAccentColor;
            const printWindow = window.open('', '_blank');
            const resumeContent = document.getElementById('resumePreview').innerHTML;
            printWindow.document.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <title>Resume - Print</title>
                    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
                    <style>
                        * { margin: 0; padding: 0; box-sizing: border-box; }
                        body { font-family: 'Inter', sans-serif; padding: 40px; max-width: 800px; margin: 0 auto; }
                        .resume-header { text-align: center; padding-bottom: 20px; border-bottom: 2px solid ${accentColor}; margin-bottom: 20px; }
                        .resume-header h1 { font-size: 1.8em; color: #1f2937; margin-bottom: 5px; }
                        .resume-header p { color: #6b7280; }
                        .resume-section { margin-bottom: 20px; }
                        .resume-section h3 { color: ${accentColor}; font-size: 1.1em; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
                        .resume-section p { color: #4b5563; line-height: 1.6; margin-bottom: 8px; }
                        /* Template styles for print */
                        .template-modern .resume-header { border-bottom: 3px solid ${accentColor}; }
                        .template-modern .resume-section h3 { text-transform: none; letter-spacing: normal; border-bottom: 1px solid ${accentColor}; padding-bottom: 5px; }
                        .template-minimal .resume-header { border-bottom: 1px solid #e5e7eb; }
                        .template-minimal .resume-section h3 { color: #1f2937; text-transform: none; letter-spacing: normal; font-weight: 600; }
                        .template-creative .resume-header { background: ${accentColor}; color: white; padding: 30px; border-radius: 8px; margin-bottom: 20px; }
                        .template-creative .resume-header h1 { color: white; }
                        .template-creative .resume-header p { color: rgba(255,255,255,0.9); }
                        .template-creative .resume-section h3 { color: ${accentColor}; background: rgba(17,153,142,0.1); padding: 8px 12px; border-radius: 4px; }
                        @media print { body { padding: 0; } }
                    </style>
                </head>
                <body class="template-${template}">
                    ${resumeContent}
                </body>
                </html>
            `);
            printWindow.document.close();
            printWindow.focus();
            setTimeout(() => { printWindow.print(); }, 250);
        }
        
        // Theme toggle
        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            const isDark = document.body.classList.contains('dark-theme');
            localStorage.setItem('darkTheme', isDark);
            document.getElementById('themeBtn').textContent = isDark ? '☀️ Toggle Light Mode' : '🌙 Toggle Dark Mode';
        }
        
        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.metaKey) {
                switch(e.key) {
                    case 's': 
                        e.preventDefault(); 
                        downloadJSON();
                        break;
                    case 'p': 
                        e.preventDefault(); 
                        printResume();
                        break;
                }
            }
        });
        
        // Offline indicator
        const offlineIndicator = document.createElement('div');
        offlineIndicator.textContent = '⚠️ Offline';
        offlineIndicator.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#ff6b6b;color:white;text-align:center;padding:5px;display:none;z-index:1001;';
        document.body.appendChild(offlineIndicator);
        window.addEventListener('online', () => offlineIndicator.style.display = 'none');
        window.addEventListener('offline', () => offlineIndicator.style.display = 'block');
    </script>
</body>

<script>
// Interactive Tutorial System
(function() {
    const tutorialSteps = [
        {
            element: 'header h1',
            title: '👋 Welcome to Resume Builder!',
            text: 'Create beautiful, professional resumes from JSON. Let\'s show you around.',
            position: 'bottom'
        },
        {
            element: '.editor-panel',
            title: '📝 Edit Your Information',
            text: 'Fill in your details here. The preview updates automatically as you type.',
            position: 'right'
        },
        {
            element: '.preview-panel',
            title: '👁️ Live Preview',
            text: 'See how your resume looks in real-time. It updates instantly!',
            position: 'left'
        },
        {
            element: '.btn-primary',
            title: '💾 Save & Export',
            text: 'Save your work or export as JSON to use later. Your data is stored locally.',
            position: 'top'
        },
        {
            element: '.json-output',
            title: '📋 JSON Output',
            text: 'Copy this JSON to share your resume or import it later. You\'re all set!',
            position: 'top'
        }
    ];
    
    let currentStep = 0;
    let isActive = false;
    
    const overlay = document.getElementById('tutorial-overlay');
    const spotlight = overlay.querySelector('.tutorial-spotlight');
    const tooltip = document.getElementById('tutorial-tooltip');
    const titleEl = document.getElementById('tutorial-title');
    const textEl = document.getElementById('tutorial-text');
    const stepEl = document.getElementById('tutorial-step');
    const totalEl = document.getElementById('tutorial-total');
    
    function updateSpotlight(element) {
        const el = document.querySelector(element);
        if (!el) return;
        const rect = el.getBoundingClientRect();
        spotlight.style.top = (rect.top - 8) + 'px';
        spotlight.style.left = (rect.left - 8) + 'px';
        spotlight.style.width = (rect.width + 16) + 'px';
        spotlight.style.height = (rect.height + 16) + 'px';
    }
    
    function updateTooltip(step) {
        const el = document.querySelector(step.element);
        if (!el) return;
        const rect = el.getBoundingClientRect();
        
        titleEl.textContent = step.title;
        textEl.textContent = step.text;
        stepEl.textContent = currentStep + 1;
        totalEl.textContent = tutorialSteps.length;
        
        // Position tooltip
        let top = rect.bottom + 20;
        let left = rect.left + rect.width / 2 - 160;
        
        if (step.position === 'top') {
            top = rect.top - tooltip.offsetHeight - 20;
        } else if (step.position === 'left') {
            left = rect.left - tooltip.offsetWidth - 20;
            top = rect.top + rect.height / 2 - tooltip.offsetHeight / 2;
        } else if (step.position === 'right') {
            left = rect.right + 20;
            top = rect.top + rect.height / 2 - tooltip.offsetHeight / 2;
        }
        
        // Keep in viewport
        left = Math.max(10, Math.min(left, window.innerWidth - tooltip.offsetWidth - 10));
        top = Math.max(10, Math.min(top, window.innerHeight - tooltip.offsetHeight - 10));
        
        tooltip.style.top = top + 'px';
        tooltip.style.left = left + 'px';
    }
    
    function showStep(index) {
        if (index < 0 || index >= tutorialSteps.length) return;
        currentStep = index;
        updateSpotlight(tutorialSteps[index].element);
        updateTooltip(tutorialSteps[index]);
        
        document.getElementById('tutorial-prev').style.display = index === 0 ? 'none' : 'inline-block';
        document.getElementById('tutorial-next').textContent = index === tutorialSteps.length - 1 ? 'Finish 🎉' : 'Next →';
    }
    
    function startTutorial() {
        isActive = true;
        overlay.classList.remove('hidden');
        showStep(0);
    }
    
    function endTutorial() {
        isActive = false;
        overlay.classList.add('hidden');
        localStorage.setItem('tutorial-completed', 'true');
    }
    
    // Event listeners
    document.getElementById('tutorial-next').addEventListener('click', () => {
        if (currentStep < tutorialSteps.length - 1) {
            showStep(currentStep + 1);
        } else {
            endTutorial();
        }
    });
    
    document.getElementById('tutorial-prev').addEventListener('click', () => {
        if (currentStep > 0) showStep(currentStep - 1);
    });
    
    document.getElementById('tutorial-skip').addEventListener('click', endTutorial);
    
    // Create launch button
    const launchBtn = document.createElement('button');
    launchBtn.className = 'tutorial-launch-btn';
    launchBtn.innerHTML = '❓';
    launchBtn.title = 'Start Tutorial';
    launchBtn.onclick = startTutorial;
    document.body.appendChild(launchBtn);
    
    // Auto-start on first visit
    if (!localStorage.getItem('tutorial-completed')) {
        setTimeout(startTutorial, 1000);
    }
    
    // Update on resize
    window.addEventListener('resize', () => {
        if (isActive) showStep(currentStep);
    });
})();
</script>

const shareBtn = document.createElement('button');
shareBtn.textContent = '🔗 Share';
shareBtn.style.cssText = 'position:fixed;bottom:20px;right:20px;padding:10px 20px;background:#6f42c1;color:white;border:none;border-radius:20px;cursor:pointer;';
shareBtn.onclick = () => {

        navigator.share({ title: document.title, url: location.href });
    } else {
        navigator.clipboard.writeText(location.href);
        shareBtn.textContent = '✅ Copied!';
        setTimeout(() => shareBtn.textContent = '🔗 Share', 2000);
    }
};
